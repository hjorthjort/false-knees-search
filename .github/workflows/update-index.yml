name: Update False Knees index

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - full
  schedule:
    - cron: "23 7 * * *"
    - cron: "47 8 1 * *"

permissions:
  contents: write

concurrency:
  group: falseknees-index-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Choose update mode
        id: mode
        run: |
          mode="${{ github.event.inputs.mode || '' }}"
          if [ -z "$mode" ]; then
            if [ "${{ github.event.schedule }}" = "47 8 1 * *" ]; then
              mode="full"
            else
              mode="latest"
            fi
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Running $mode update"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: npm ci

      - name: Restore scraper cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/archive.json
            data/pages
            data/records
            data/ocr
          key: falseknees-scrape-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            falseknees-scrape-${{ runner.os }}-

      - name: Update latest comics
        if: steps.mode.outputs.mode == 'latest'
        run: npm run scrape:latest

      - name: Refresh full archive
        if: steps.mode.outputs.mode == 'full'
        run: npm run scrape:full

      - name: Verify generated search app
        run: npm run smoke

      - name: Commit public index changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data public/thumbs
          if git diff --cached --quiet; then
            echo "No public index changes to commit."
          else
            git commit -m "Update False Knees search index (${{ steps.mode.outputs.mode }})"
            git push
          fi

      - name: Save scraper cache after full refresh
        if: steps.mode.outputs.mode == 'full'
        uses: actions/cache/save@v4
        with:
          path: |
            data/archive.json
            data/pages
            data/records
            data/ocr
          key: falseknees-scrape-${{ runner.os }}-${{ github.run_id }}
